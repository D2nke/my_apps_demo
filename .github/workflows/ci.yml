name: CI

on:
  push:
    branches: ["python"]
  pull_request:
    branches: ["python"]

jobs:
  test:
    uses: D2nke/my_workflows/.github/workflows/test-python.yml@main
    with:
      python_version: "3.11"
      requirements_file: requirements.txt
      test_path: tests/
      coverage_fail_under: 70

  security:
    needs: test
    uses: D2nke/my_workflows/.github/workflows/security-scan.yml@main
    with:
      sonar_project_key: my-apps-demo-python
      enable_mend: true
    secrets:
      sonar_token: ${{ secrets.SONAR_TOKEN }}
      mend_api_key: ${{ secrets.MEND_API_KEY }}

  build:
    needs: security
    uses: D2nke/my_workflows/.github/workflows/build-docker.yml@main
    with:
      image_name: ghcr.io/D2nke/my-apps-demo-python
    secrets:
      registry_username: ${{ github.actor }}
      registry_password: ${{ secrets.GITHUB_TOKEN }}

  deploy-dev:
    needs: build
    uses: D2nke/my_workflows/.github/workflows/deploy.yml@main
    with:
      target: server
      environment: dev
      image_name: ghcr.io/D2nke/my-apps-demo-python
    secrets:
      ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}
